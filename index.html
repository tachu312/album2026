<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panini Mundial 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .active-group { background-color: #7a1c1c; color: white; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">

    <header class="bg-red-950 p-4 shadow-xl text-center border-b border-red-800 sticky top-0 z-50">
        <h1 class="text-xl font-bold tracking-wider text-amber-400">PANINI DIGITAL APP</h1>
        <p class="text-xs text-slate-300">Control de Cromos - Mundial 48 Selecciones</p>
    </header>

    <main class="p-4 max-w-md mx-auto space-y-6">
        
        <section class="bg-slate-800 p-4 rounded-xl shadow-lg border border-slate-700">
            <label class="block text-sm font-semibold text-amber-400 mb-2 font-mono">1. SELECCIONA UN GRUPO:</label>
            <select id="groupSelect" class="w-full bg-slate-950 border border-slate-600 rounded-lg p-3 text-slate-200 focus:outline-none focus:border-amber-400 text-base" onchange="loadTeams()">
                <option value="">-- Elige un Grupo --</option>
                <option value="A">GRUPO A (MEX, RSA, KOR, CZE)</option>
                <option value="B">GRUPO B (CAN, BIH, QAT, SUI)</option>
                <option value="C">GRUPO C (BRA, MAR, HAI, SCO)</option>
                <option value="D">GRUPO D (USA, PAR, AUS, TUR)</option>
                <option value="E">GRUPO E (GER, CUW, CIV, ECU)</option>
                <option value="F">GRUPO F (NED, JPN, SWE, TUN)</option>
                <option value="G">GRUPO G (BEL, EGV, IRN, NZL)</option>
                <option value="H">GRUPO H (ESP, CPV, KSA, URU)</option>
                <option value="I">GRUPO I (FRA, SEN, IRQ, NOR)</option>
                <option value="J">GRUPO J (ARG, ALG, AUT, JOR)</option>
                <option value="K">GRUPO K (POR, COD, UZB, COL)</option>
                <option value="L">GRUPO L (ENG, CRO, GHA, PAN)</option>
            </select>
        </section>

        <section id="teamsSection" class="hidden bg-slate-800 p-4 rounded-xl shadow-lg border border-slate-700 space-y-3">
            <label class="block text-sm font-semibold text-amber-400 font-mono">2. TOCA UNA SELECCIÓN:</label>
            <div id="teamsContainer" class="grid grid-cols-2 gap-3">
                </div>
        </section>

        <section class="bg-slate-800 p-4 rounded-xl shadow-lg border border-slate-700">
            <label class="block text-sm font-semibold text-amber-400 mb-2 font-mono">BUSCADOR RÁPIDO DE JUGADOR:</label>
            <input type="text" id="searchBar" oninput="searchPlayer()" placeholder="Ej: Mbappe, James, Messi..." class="w-full bg-slate-950 border border-slate-600 rounded-lg p-3 text-slate-200 focus:outline-none focus:border-amber-400 text-base">
        </section>

        <section id="playersSection" class="hidden bg-slate-800 p-4 rounded-xl shadow-lg border border-slate-700">
            <div class="flex justify-between items-center border-b border-slate-700 pb-2 mb-4">
                <h2 id="selectedTeamTitle" class="text-lg font-bold text-amber-400">Jugadores</h2>
                <span class="text-xs bg-slate-950 px-2 py-1 rounded text-slate-400 font-mono" id="counterLabel">0 / 18</span>
            </div>
            
            <div id="playersContainer" class="space-y-2 max-h-[50vh] overflow-y-auto pr-1">
                </div>
        </section>

    </main>

    <script>
        const gruposData = {
            "A": ["México (MEX)", "Sudáfrica (RSA)", "Corea del Sur (KOR)", "Chequia (CZE)"],
            "B": ["Canadá (CAN)", "Bosnia-Herzegovina (BIH)", "Catar (QAT)", "Suiza (SUI)"],
            "C": ["Brasil (BRA)", "Marruecos (MAR)", "Haití (HAI)", "Escocia (SCO)"],
            "D": ["Estados Unidos (USA)", "Paraguay (PAR)", "Australia (AUS)", "Turquía (TUR)"],
            "E": ["Alemania (GER)", "Curazao (CUW)", "Costa de Marfil (CIV)", "Ecuador (ECU)"],
            "F": ["Países Bajos (NED)", "Japón (JPN)", "Suecia (SWE)", "Túnez (TUN)"],
            "G": ["Bélgica (BEL)", "Egipto (EGV)", "Irán (IRN)", "Nueva Zelanda (NZL)"],
            "H": ["España (ESP)", "Cabo Verde (CPV)", "Arabia Saudita (KSA)", "Uruguay (URU)"],
            "I": ["Francia (FRA)", "Senegal (SEN)", "Irak (IRQ)", "Noruega (NOR)"],
            "J": ["Argentina (ARG)", "Argelia (ALG)", "Austria (AUT)", "Jordania (JOR)"],
            "K": ["Portugal (POR)", "Congo DR (COD)", "Uzbekistán (UZB)", "Colombia (COL)"],
            "L": ["Inglaterra (ENG)", "Croacia (CRO)", "Ghana (GHA)", "Panamá (PAN)"]
        };

        const jugadoresData = {
            "México (MEX)": ["Escudo", "Guillermo Ochoa", "Luis Malagón", "César Montes", "Johan Vásquez", "Jorge Sánchez", "Jesús Gallardo", "Gerardo Arteaga", "Edson Álvarez", "Luis Romo", "Luis Chávez", "Érick Sánchez", "Carlos Rodríguez", "Orbelín Pineda", "Uriel Antuna", "Santiago Giménez", "Henry Martín", "Hirving Lozano"],
            "Sudáfrica (RSA)": ["Escudo", "Ronwen Williams", "Veli Mothwa", "Khuliso Mudau", "Aubrey Modiba", "Mothobi Mvala", "Grant Kekana", "Nkosinathi Sibisi", "Thapelo Morena", "Teboho Mokoena", "Sphephelo Sithole", "Thabang Monare", "Themba Zwane", "Percy Tau", "Evidence Makgopa", "Thapelo Maseko", "Mihlali Mayambela", "Iqraam Rayners"],
            "Corea del Sur (KOR)": ["Escudo", "Jo Hyeon-woo", "Kim Min-jae", "Kim Young-gwon", "Kim Jin-su", "Seol Young-woo", "Lee Jae-sung", "Hwang In-beom", "Lee Kang-in", "Son Heung-min", "Hwang Hee-chan", "Cho Gue-sung"],
            "Chequia (CZE)": ["Escudo", "Jindřich Staněk", "Tomáš Holeš", "Robin Hranáč", "Ladislav Krejčí", "Vladimír Coufal", "Tomáš Souček", "Lukáš Provod", "Antonín Barák", "Patrik Schick", "Adam Hložek", "Mojmír Chytil"],
            "Colombia (COL)": ["Escudo", "Camilo Vargas", "Álvaro Montero", "Daniel Muñoz", "Davinson Sánchez", "Carlos Cuesta", "Jhon Lucumí", "Johan Mojica", "Jefferson Lerma", "Richard Ríos", "Jhon Arias", "James Rodríguez", "Juan Fernando Quintero", "Luis Díaz", "Jhon Córdoba", "Jhon Jader Durán", "Rafael Santos Borré", "Jorge Carrascal"],
            "Argentina (ARG)": ["Escudo", "Emiliano Martínez", "Franco Armani", "Nahuel Molina", "Cristian Romero", "Nicolás Otamendi", "Lisandro Martínez", "Nicolás Tagliafico", "Rodrigo De Paul", "Enzo Fernández", "Alexis Mac Allister", "Leandro Paredes", "Lionel Messi", "Ángel Di María", "Julián Álvarez", "Lautaro Martínez", "Nicolás González"],
            "Brasil (BRA)": ["Escudo", "Alisson Becker", "Éderson", "Danilo", "Marquinhos", "Éder Militão", "Gabriel Magalhães", "Bruno Guimarães", "Douglas Luiz", "Lucas Paquetá", "Rodrygo", "Vinícius Júnior", "Endrick", "Raphinha", "Gabriel Martinelli"],
            "Francia (FRA)": ["Escudo", "Mike Maignan", "Jules Koundé", "Dayot Upamecano", "Ibrahima Konaté", "William Saliba", "Théo Hernandez", "Aurélien Tchouaméni", "Adrien Rabiot", "Antoine Griezmann", "Ousmane Dembélé", "Kylian Mbappé", "Marcus Thuram", "Olivier Giroud"],
            "España (ESP)": ["Escudo", "Unai Simón", "Dani Carvajal", "Robin Le Normand", "Aymeric Laporte", "Marc Cucurella", "Rodri Hernández", "Fabián Ruiz", "Pedri", "Dani Olmo", "Lamine Yamal", "Nico Williams", "Álvaro Morata", "Mikel Oyarzabal"],
            "Inglaterra (ENG)": ["Escudo", "Jordan Pickford", "Kyle Walker", "John Stones", "Marc Guéhi", "Kieran Trippier", "Declan Rice", "Jude Bellingham", "Bukayo Saka", "Phil Foden", "Cole Palmer", "Harry Kane", "Ollie Watkins"],
            "Panamá (PAN)": ["Escudo", "Orlando Mosquera", "José Córdoba", "Michael Amir Murillo", "Eric Davis", "Fidel Escobar", "Adalberto Carrasquilla", "Aníbal Godoy", "Édgar Yoel Bárcenas", "Ismael Díaz", "José Fajardo", "Cecilio Waterman"]
        };

        // Rellenar automáticamente el resto de selecciones
        Object.values(gruposData).flat().forEach(p => {
            if(!jugadoresData[p]) {
                jugadoresData[p] = ["Escudo", "Portero Titular", "Portero Suplente", "Defensa Central 1", "Defensa Central 2", "Lateral Derecho", "Lateral Izquierdo", "Mediocampista 1", "Mediocampista 2", "Mediocampista 3", "Extremo Derecho", "Extremo Izquierdo", "Delantero Centro", "Jugador de Recambio 1", "Jugador de Recambio 2", "Jugador de Recambio 3", "Jugador de Recambio 4", "Estrella Local"];
            }
        });

        let currentActiveTeam = "";

        // Función auxiliar para quitar acentos/tildes y dejar todo limpio
        function limpiarTexto(texto) {
            return texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        }

        function loadTeams() {
            const grupo = document.getElementById("groupSelect").value;
            const container = document.getElementById("teamsContainer");
            const section = document.getElementById("teamsSection");
            
            container.innerHTML = "";
            document.getElementById("playersSection").classList.add("hidden");
            document.getElementById("searchBar").value = ""; // Limpiar buscador al elegir grupo
            
            if (!grupo) {
                section.classList.add("hidden");
                return;
            }
            
            section.classList.remove("hidden");
            gruposData[grupo].forEach(team => {
                const btn = document.createElement("button");
                btn.className = "p-3 bg-slate-900 border border-slate-700 rounded-lg font-medium text-sm text-slate-200 hover:border-amber-400 active:bg-amber-500 transition-all text-center truncate";
                btn.innerText = team.split(" (")[0];
                btn.onclick = () => loadPlayers(team, btn);
                container.appendChild(btn);
            });
        }

        function loadPlayers(teamName, clickedBtn) {
            currentActiveTeam = teamName;
            
            document.querySelectorAll("#teamsContainer button").forEach(b => b.classList.remove("bg-amber-500", "text-slate-950", "border-amber-400"));
            if(clickedBtn) {
                clickedBtn.classList.add("bg-amber-500", "text-slate-950", "border-amber-400");
            }

            const section = document.getElementById("playersSection");
            const container = document.getElementById("playersContainer");
            const title = document.getElementById("selectedTeamTitle");
            
            container.innerHTML = "";
            section.classList.remove("hidden");
            title.innerText = teamName;
            
            const prefix = teamName.split("(")[1].replace(")", "").trim();
            const players = jugadoresData[teamName] || [];
            
            let checkedCount = 0;

            players.forEach((player, index) => {
                const numCromo = index + 1;
                const storageKey = `panini2026_${prefix}_${numCromo}`;
                const isChecked = localStorage.getItem(storageKey) === "true";
                
                if(isChecked) checkedCount++;

                const row = document.createElement("div");
                row.className = `flex items-center justify-between p-3 rounded-lg border transition-all ${isChecked ? 'bg-emerald-950/40 border-emerald-500/50' : 'bg-slate-950 border-slate-800'}`;
                row.id = `row_${prefix}_${numCromo}`;

                row.innerHTML = `
                    <div class="flex items-center space-x-3 min-w-0" onclick="document.getElementById('chk_${prefix}_${numCromo}').click()">
                        <span class="font-mono text-xs font-bold px-2 py-0.5 bg-slate-800 rounded text-amber-400 border border-slate-700">${prefix} ${numCromo}</span>
                        <span class="text-sm font-medium text-slate-200 truncate select-all">${player}</span>
                    </div>
                    <input type="checkbox" id="chk_${prefix}_${numCromo}" ${isChecked ? 'checked' : ''} 
                        class="w-5 h-5 rounded bg-slate-900 border-slate-600 text-emerald-500 focus:ring-0 focus:ring-offset-0"
                        onchange="togglePlayer('${prefix}', ${numCromo}, this)">
                `;
                container.appendChild(row);
            });

            updateCounter(checkedCount, players.length);
        }

        function togglePlayer(prefix, num, checkbox) {
            const storageKey = `panini2026_${prefix}_${num}`;
            const row = document.getElementById(`row_${prefix}_${num}`);
            
            localStorage.setItem(storageKey, checkbox.checked);
            
            if(checkbox.checked) {
                row.classList.remove("bg-slate-950", "border-slate-800");
                row.classList.add("bg-emerald-950/40", "border-emerald-500/50");
            } else {
                row.classList.remove("bg-emerald-950/40", "border-emerald-500/50");
                row.classList.add("bg-slate-950", "border-slate-800");
            }

            const total = jugadoresData[currentActiveTeam].length;
            let currentChecked = 0;
            for(let i=1; i<=total; i++) {
                if(localStorage.getItem(`panini2026_${prefix}_${i}`) === "true") currentChecked++;
            }
            updateCounter(currentChecked, total);
        }

        function updateCounter(checked, total) {
            document.getElementById("counterLabel").innerText = `${checked} / ${total}`;
        }

        function searchPlayer() {
            const query = limpiarTexto(document.getElementById("searchBar").value);
            const container = document.getElementById("playersContainer");
            const section = document.getElementById("playersSection");
            
            if(query.length < 2) {
                if(query.length === 0 && currentActiveTeam) {
                    loadPlayers(currentActiveTeam, null);
                }
                return; 
            }
            
            document.getElementById("groupSelect").value = "";
            document.getElementById("teamsSection").classList.add("hidden");
            container.innerHTML = "";
            section.classList.remove("hidden");
            document.getElementById("selectedTeamTitle").innerText = "Resultados de búsqueda";
            document.getElementById("counterLabel").innerText = "Filtro Activo";

            Object.keys(jugadoresData).forEach(teamName => {
                const prefix = teamName.split("(")[1].replace(")", "").trim();
                jugadoresData[teamName].forEach((player, index) => {
                    // Limpiamos de acentos tanto la búsqueda como el nombre del jugador en la base de datos
                    if(limpiarTexto(player).includes(query)) {
                        const numCromo = index + 1;
                        const storageKey = `panini2026_${prefix}_${numCromo}`;
                        const isChecked = localStorage.getItem(storageKey) === "true";

                        const row = document.createElement("div");
                        row.className = `flex items-center justify-between p-3 rounded-lg border ${isChecked ? 'bg-emerald-950/40 border-emerald-500/50' : 'bg-slate-950 border-slate-800'}`;
                        row.innerHTML = `
                            <div class="flex items-center space-x-3 min-w-0">
                                <span class="font-mono text-xs font-bold px-2 py-0.5 bg-slate-800 rounded text-amber-400 border border-slate-700">${prefix} ${numCromo}</span>
                                <div class="flex flex-col min-w-0">
                                    <span class="text-sm font-medium text-slate-200 truncate select-all">${player}</span>
                                    <span class="text-[10px] text-slate-400 uppercase">${teamName.split(" (")[0]}</span>
                                </div>
                            </div>
                            <input type="checkbox" id="chk_${prefix}_${numCromo}" ${isChecked ? 'checked' : ''} 
                                class="w-5 h-5 rounded bg-slate-900 border-slate-600 text-emerald-500 focus:ring-0 focus:ring-offset-0"
                                onchange="togglePlayerSearch('${prefix}', ${numCromo}, this, this.parentElement)">
                        `;
                        container.appendChild(row);
                    }
                });
            });
        }

        // Función especial para marcar desde la misma pantalla de búsqueda
        function togglePlayerSearch(prefix, num, checkbox, rowElement) {
            const storageKey = `panini2026_${prefix}_${num}`;
            localStorage.setItem(storageKey, checkbox.checked);
            if(checkbox.checked) {
                rowElement.classList.remove("bg-slate-950", "border-slate-800");
                rowElement.classList.add("bg-emerald-950/40", "border-emerald-500/50");
            } else {
                rowElement.classList.remove("bg-emerald-950/40", "border-emerald-500/50");
                rowElement.classList.add("bg-slate-950", "border-slate-800");
            }
        }
    </script>
</body>
</html>
